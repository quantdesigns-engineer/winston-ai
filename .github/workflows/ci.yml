name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-go:
    name: Go Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -v -race -count=1 ./internal/...

      - name: Test coverage
        run: go test -coverprofile=coverage.out -covermode=atomic ./internal/...

      - name: Check coverage threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Total coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 60" | bc -l) )); then
            echo "::error::Coverage ${COVERAGE}% is below 60% threshold"
            exit 1
          fi

      - name: Upload coverage
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test-go
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binary
        run: go build -o bin/polymr ./cmd/polymr

      - name: Verify binary exists
        run: test -f bin/polymr

  security:
    name: Security Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run security tests
        run: go test -v -run TestSecurity ./internal/...

      - name: Check for hardcoded secrets
        run: |
          FOUND=0
          for pattern in 'password\s*=' 'secret\s*=' 'api[_-]?key\s*=' 'token\s*='; do
            MATCHES=$(grep -rn --include="*.go" -iE "$pattern" internal/ cmd/ 2>/dev/null | grep -v '_test.go' | grep -v 'os.Getenv' | grep -v 'Setenv' | grep -v '""' || true)
            if [ -n "$MATCHES" ]; then
              echo "::warning::Potential hardcoded secret pattern '$pattern':"
              echo "$MATCHES"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 1 ]; then
            echo "::warning::Review the above matches for hardcoded secrets"
          fi

      - name: Check for dangerous patterns
        run: |
          EXEC_COUNT=$(grep -rn --include="*.go" 'exec.Command' internal/ cmd/ | wc -l)
          echo "Found $EXEC_COUNT exec.Command calls — verify all inputs are sanitized"

          SKIP_PERMS=$(grep -rn --include="*.go" 'dangerously-skip-permissions' internal/ cmd/ | wc -l)
          echo "Found $SKIP_PERMS uses of --dangerously-skip-permissions (expected for single-user system)"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  test-frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
